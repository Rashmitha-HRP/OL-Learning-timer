<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O/L 2026 Master Dashboard - Rashmitha EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --red: #ff3e3e;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 62, 62, 0.15);
            --dark-box: rgba(0, 0, 0, 0.6); /* වඩාත් අඳුරු කළ බොක්ස් */
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #150505 0%, #050505 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 40px; }
        #current-time { font-size: 4rem; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(255, 62, 62, 0.2); }
        #current-date { color: var(--red); font-weight: bold; text-transform: uppercase; letter-spacing: 4px; font-size: 0.9rem; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { border-color: var(--red); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 62, 62, 0.1); }

        h2 { font-size: 0.8rem; color: var(--red); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; opacity: 0.8; }

        /* DARKER COUNTDOWN BOXES */
        .ol-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .ol-box { 
            background: var(--dark-box); 
            padding: 18px 5px; 
            border-radius: 18px; 
            border: 1px solid #111; /* බොක්ස් එක වටේටත් අඳුරු බෝඩර් එකක් */
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .ol-num { font-size: 2rem; font-weight: 900; display: block; color: #fff; }
        .ol-label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }

        /* POMODORO */
        #timer-display { font-size: 5.5rem; font-weight: 900; margin: 15px 0; color: var(--red); letter-spacing: -2px; }
        .btn-group { display: flex; gap: 12px; justify-content: center; }
        button { 
            background: var(--red); border: none; padding: 16px 32px; border-radius: 14px; 
            color: white; font-weight: 900; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 62, 62, 0.3);
        }
        button.secondary { background: #111; border: 1px solid #222; box-shadow: none; }
        
        #status-text { font-weight: bold; font-size: 1rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .status-work { color: var(--red); }
        .status-break { color: #00ff88; }

        /* MOTIVATION & MUSIC */
        #quote-text { font-size: 1.1rem; line-height: 1.6; color: #ddd; min-height: 85px; display: flex; align-items: center; justify-content: center; padding: 0 10px; }
        .music-btn { background: #111; border: 1px solid #222; padding: 14px; color: white; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; }
        .music-btn:hover { background: var(--red); border-color: var(--red); }

        /* TO-DO */
        .todo-input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #0a0a0a; border: 1px solid #222; padding: 14px; border-radius: 12px; color: white; outline: none; }
        .todo-item { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #111; }

        footer { margin-top: 60px; color: #333; font-weight: bold; font-size: 0.75rem; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div id="current-date">LOADING...</div>
        <h1 id="current-time">00:00:00</h1>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h2>O/L 2026 Countdown</h2>
            <div class="ol-grid">
                <div class="ol-box"><span class="ol-num" id="d">00</span><span class="ol-label">Days</span></div>
                <div class="ol-box"><span class="ol-num" id="h">00</span><span class="ol-label">Hours</span></div>
                <div class="ol-box"><span class="ol-num" id="m">00</span><span class="ol-label">Mins</span></div>
                <div class="ol-box"><span class="ol-num" id="s">00</span><span class="ol-label">Secs</span></div>
            </div>
        </div>

        <div class="card" style="grid-row: span 2;">
            <h2>Focus Session</h2>
            <div id="status-text" class="status-work">WORK MODE</div>
            <div id="timer-display">25:00</div>
            <div class="btn-group">
                <button onclick="toggleTimer()" id="start-btn">START SESSION</button>
                <button class="secondary" onclick="resetTimer()">RESET</button>
            </div>
            <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
        </div>

        <div class="card">
            <h2>Daily Motivation</h2>
            <div id="quote-text">"සාර්ථකත්වය යනු වැටෙන හැම වාරයකදීම නැවත නැගිටීමයි."</div>
        </div>

        <div class="card">
            <h2>Study Ambience</h2>
            <button class="music-btn" id="mBtn" onclick="toggleMusic()">▶ PLAY FOCUS LOFI</button>
            <audio id="bgMusic" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
        </div>

        <div class="card">
            <h2>Study Goals</h2>
            <div class="todo-input-wrap">
                <input type="text" id="taskInput" placeholder="Add a study goal...">
                <button onclick="addTask()">ADD</button>
            </div>
            <div id="todoList"></div>
        </div>
    </div>

    <footer>© COPYRIGHT Rashmitha EDITZ</footer>

    <script>
        // CLOCK
        function clock() {
            const now = new Date();
            document.getElementById("current-time").innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById("current-date").innerText = now.toLocaleDateString('si-LK', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
        }
        setInterval(clock, 1000); clock();

        // COUNTDOWN
        const target = new Date("December 8, 2026 08:30:00").getTime();
        setInterval(() => {
            const diff = target - new Date().getTime();
            document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // MUSIC
        const music = document.getElementById("bgMusic");
        function toggleMusic() {
            if (music.paused) { music.play(); document.getElementById("mBtn").innerText = "⏸ PAUSE MUSIC"; }
            else { music.pause(); document.getElementById("mBtn").innerText = "▶ PLAY MUSIC"; }
        }

        // MOTIVATION
        const quotes = [
            "අද කරන කැපවීම හෙට ඔබේ සාර්ථකත්වය තීරණය කරයි.",
            "අසීරුම කඳු මුදුන්වලට හොඳම දර්ශන උරුම වේ.",
            "සාර්ථකත්වයේ රහස කැපවීමයි.",
            "විවේක ගන්න, නමුත් කිසිවිටෙකත් අත්නොහරින්න.",
            "ඔබට කළ නොහැකි දෙයක් නැත, ඔබ උත්සාහ කරන්නේ නම්.",
            "වැටෙන වාරයක් පාසා ශක්තිමත්ව නැගිටින්න.",
            "ඔබේ උපරිමය අද දවසේ ලබා දෙන්න.",
            "සාර්ථක මිනිසුන් කිසිවිටෙකත් නිදහසට කරුණු නොකියයි.",
            "නිහඬව වැඩ කරන්න, ඔබේ සාර්ථකත්වයට ශබ්ද කිරීමට ඉඩ දෙන්න.",
            "නොනැවතී ඉදිරියටම යන්න."
        ];
        setInterval(() => {
            const qText = document.getElementById("quote-text");
            qText.style.opacity = 0;
            setTimeout(() => {
                qText.innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
                qText.style.opacity = 1;
            }, 500);
        }, 30000);

        // POMODORO AUTO-FLOW
        let workTime = 25 * 60, breakTime = 5 * 60;
        let currentTime = workTime, running = false, interval, isWork = true;

        function updateDisplay() {
            let m = Math.floor(currentTime / 60), s = currentTime % 60;
            document.getElementById("timer-display").innerText = `${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        }

        function toggleTimer() {
            if (running) { clearInterval(interval); running = false; document.getElementById("start-btn").innerText = "RESUME"; }
            else {
                running = true; document.getElementById("start-btn").innerText = "PAUSE";
                interval = setInterval(() => {
                    currentTime--; updateDisplay();
                    if (currentTime <= 0) {
                        clearInterval(interval); running = false;
                        document.getElementById("alertSound").play();
                        setTimeout(() => { document.getElementById("alertSound").play(); }, 1500);
                        isWork = !isWork;
                        currentTime = isWork ? workTime : breakTime;
                        document.getElementById("status-text").innerText = isWork ? "WORK MODE" : "BREAK MODE";
                        document.getElementById("status-text").className = isWork ? "status-work" : "status-break";
                        setTimeout(() => { updateDisplay(); toggleTimer(); }, 3000);
                    }
                }, 1000);
            }
        }

        function resetTimer() { clearInterval(interval); running = false; isWork = true; currentTime = workTime; updateDisplay(); document.getElementById("status-text").innerText = "WORK MODE"; document.getElementById("start-btn").innerText = "START SESSION"; }

        // TO-DO
        function addTask() {
            let val = document.getElementById("taskInput").value; if(!val) return;
            let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
            tasks.push(val); localStorage.setItem("tasks", JSON.stringify(tasks));
            document.getElementById("taskInput").value = ""; renderTasks();
        }
        function renderTasks() {
            let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
            document.getElementById("todoList").innerHTML = tasks.map((t, i) => `<div class="todo-item"><span>✅ ${t}</span><button style="background:none; border:none; color:#444; cursor:pointer;" onclick="delTask(${i})">✖</button></div>`).join("");
        }
        function delTask(i) {
            let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
            tasks.splice(i, 1); localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
        }
        renderTasks();
    </script>
</body>
</html>
